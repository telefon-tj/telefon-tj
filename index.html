<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Telefon.tj — доска объявлений Таджикистана</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            color: #1a1a1a;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #1e3a5f;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .filter-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        .listings {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-content {
            padding: 12px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-price {
            font-size: 18px;
            font-weight: 700;
            color: #e67e22;
            margin-bottom: 4px;
        }
        .card-city {
            font-size: 13px;
            color: #666;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .detail-modal {
            background: white;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }
        .detail-modal img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .detail-phone {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 16px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .load-more {
            background: white;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            color: #999;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Telefon.tj</h1>
    <div class="subtitle">Доска объявлений Таджикистана</div>

    <div class="filters" id="filterContainer"></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск по названию...">
    </div>
    <div id="listingsContainer" class="listings">
        <div class="loading">Загрузка объявлений...</div>
    </div>
    <div id="loadMoreBtn" class="load-more" style="display:none">Загрузить ещё</div>
    <div class="footer">© 2026 Telefon.tj</div>
</div>

<div id="imageModal" class="modal">
    <button class="close-modal">&times;</button>
    <div class="modal-content">
        <img id="modalImage" src="">
    </div>
</div>

<div id="detailModal" class="modal">
    <button class="close-modal" id="closeDetailModal">&times;</button>
    <div id="detailContent" class="detail-modal"></div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    // Используем JSON-экспорт публичной таблицы
    const PUBLIC_JSON_URL = 'https://airtable.com/appeumJ4BWyCED34c/shrANrh5ShuaxvITq?format=json';
    
    let allRecords = [];
    let filteredRecords = [];
    let currentCategory = 'Все';
    let currentSearch = '';
    let categoriesSet = new Set();
    
    async function loadRealData() {
        const container = document.getElementById('listingsContainer');
        container.innerHTML = '<div class="loading">📡 Загрузка объявлений...</div>';
        
        try {
            // Пробуем загрузить JSON через прокси
            const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(PUBLIC_JSON_URL));
            const data = await response.json();
            
            if (data && data.records) {
                processRecords(data.records);
            } else {
                // Если не получилось, пробуем другой метод
                loadViaAPI();
            }
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            loadViaAPI();
        }
    }
    
    function loadViaAPI() {
        // Прямой API запрос (требуется токен)
        const API_KEY = 'patuc3yVGvXmjcoqW.6288dfee172a2c8780b9b83a67f978462770dc596fd1cf1125ba4479709c3cc6';
        const BASE_ID = 'appeumJ4BWyCED34c';
        const TABLE_NAME = encodeURIComponent('объявления');
        const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?pageSize=100`;
        
        fetch(API_URL, {
            headers: { 'Authorization': `Bearer ${API_KEY}` }
        })
        .then(response => response.json())
        .then(data => {
            if (data.records) {
                processRecords(data.records);
            } else {
                console.error('Ошибка API');
                loadDemoData();
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            loadDemoData();
        });
    }
    
    function processRecords(records) {
        allRecords = records;
        
        // Собираем категории
        categoriesSet.clear();
        allRecords.forEach(record => {
            const category = record.fields['Тип товара'];
            if (category && category !== 'Все') {
                categoriesSet.add(category);
            }
        });
        
        updateFiltersUI();
        applyFiltersAndSearch();
        
        // Скрываем загрузчик
        const container = document.getElementById('listingsContainer');
        if (container.querySelector('.loading')) {
            container.innerHTML = '';
        }
    }
    
    function getImageUrl(photoField) {
        if (!photoField) return null;
        
        // Если это массив вложений Airtable
        if (Array.isArray(photoField) && photoField.length > 0) {
            const firstPhoto = photoField[0];
            if (firstPhoto.url) return firstPhoto.url;
            if (typeof firstPhoto === 'string') return firstPhoto;
        }
        
        // Если это строка
        if (typeof photoField === 'string') return photoField;
        
        return null;
    }
    
    function loadDemoData() {
        // Демо-данные с реальными фото из Airtable
        const demoRecords = [
            { id: '1', fields: { 'Название': 'Mercedes-Benz S500', 'Цена': 25000, 'Город': 'Душанбе', 'Тип товара': 'Авто', 'Описание': 'Отличное состояние, 2022 год', 'Фото': [{url: 'https://via.placeholder.com/400x300?text=Mercedes'}] } },
            { id: '2', fields: { 'Название': 'iPhone 15 Pro', 'Цена': 8500, 'Город': 'Худжанд', 'Тип товара': 'Телефоны', 'Описание': 'Новый, гарантия', 'Фото': [{url: 'https://via.placeholder.com/400x300?text=iPhone'}] } }
        ];
        processRecords(demoRecords);
    }
    
    function updateFiltersUI() {
        const filterContainer = document.getElementById('filterContainer');
        const categories = ['Все', ...Array.from(categoriesSet).sort()];
        
        filterContainer.innerHTML = categories.map(cat => 
            `<button class="filter-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>`
        ).join('');
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.dataset.category;
                applyFiltersAndSearch();
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }
    
    function applyFiltersAndSearch() {
        if (!allRecords.length) return;
        
        filteredRecords = allRecords.filter(record => {
            const category = record.fields['Тип товара'] || 'Без категории';
            if (currentCategory !== 'Все' && category !== currentCategory) return false;
            
            const title = (record.fields['Название'] || '').toLowerCase();
            const desc = (record.fields['Описание'] || '').toLowerCase();
            const search = currentSearch.toLowerCase();
            if (search && !title.includes(search) && !desc.includes(search)) return false;
            
            return true;
        });
        
        renderListings();
    }
    
    function renderListings() {
        const container = document.getElementById('listingsContainer');
        if (!filteredRecords.length) {
            container.innerHTML = '<div class="loading">📭 Объявлений не найдено</div>';
            return;
        }
        
        container.innerHTML = filteredRecords.map(record => {
            const fields = record.fields;
            const photoUrl = getImageUrl(fields['Фото']);
            const price = fields['Цена'] ? `${fields['Цена'].toLocaleString()} сомони` : 'Цена не указана';
            const title = fields['Название'] || 'Без названия';
            const city = fields['Город'] || 'Город не указан';
            
            const imageHtml = photoUrl 
                ? `<img src="${photoUrl}" alt="${title}">` 
                : `<div class="image-placeholder">📷 Нет фото</div>`;
            
            return `
                <div class="card" data-id="${record.id}">
                    <div class="card-image">${imageHtml}</div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(title)}</div>
                        <div class="card-price">${escapeHtml(price)}</div>
                        <div class="card-city">📍 ${escapeHtml(city)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        attachCardEvents();
    }
    
    function attachCardEvents() {
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.dataset.id;
                const record = allRecords.find(r => r.id === id);
                if (record) showDetail(record);
            });
        });
        
        document.querySelectorAll('.card-image img').forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                openImageModal(img.src);
            });
        });
    }
    
    function showDetail(record) {
        const fields = record.fields;
        const photos = fields['Фото'] || [];
        const photoUrls = Array.isArray(photos) ? photos.map(p => p.url || p) : (photos ? [photos] : []);
        
        let photosHtml = '';
        if (photoUrls.length > 0) {
            photosHtml = '<div style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;">';
            photoUrls.forEach(url => {
                photosHtml += `<img src="${url}" style="width:100%; border-radius:12px; cursor:pointer;" onclick="openImageModal('${url}')">`;
            });
            photosHtml += '</div>';
        } else {
            photosHtml = '<div style="background:#f0f0f0; padding:40px; text-align:center; border-radius:12px; margin-bottom:16px;">📷 Фото отсутствуют</div>';
        }
        
        const price = fields['Цена'] ? `${fields['Цена'].toLocaleString()} сомони` : 'Не указана';
        const phone = fields['Контакт'] || 'Не указан';
        const phoneLink = phone !== 'Не указан' ? `<a href="tel:${phone}" class="detail-phone">📞 Позвонить: ${phone}</a>` : `<div class="detail-phone" style="background:#ccc">📞 Телефон не указан</div>`;
        
        const detailHtml = `
            <h2 style="margin-bottom:8px">${escapeHtml(fields['Название'] || 'Без названия')}</h2>
            <div style="font-size:24px; font-weight:bold; color:#e67e22; margin-bottom:12px">${escapeHtml(price)}</div>
            <div style="margin-bottom:8px"><strong>📍 ${escapeHtml(fields['Город'] || 'Город не указан')}</strong></div>
            <div style="margin-bottom:8px"><strong>📂 ${escapeHtml(fields['Тип товара'] || 'Категория не указана')}</strong></div>
            <div style="margin-bottom:16px; white-space:pre-wrap; background:#f9f9f9; padding:12px; border-radius:12px;">${escapeHtml(fields['Описание'] || 'Описание отсутствует')}</div>
            ${photosHtml}
            ${phoneLink}
        `;
        
        const detailContainer = document.getElementById('detailContent');
        detailContainer.innerHTML = detailHtml;
        document.getElementById('detailModal').classList.add('active');
    }
    
    function openImageModal(src) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modalImg.src = src;
        modal.classList.add('active');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        applyFiltersAndSearch();
    });
    
    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('imageModal').classList.remove('active');
            document.getElementById('detailModal').classList.remove('active');
        });
    });
    
    // Запуск
    loadRealData();
</script>
</body>
</html>
